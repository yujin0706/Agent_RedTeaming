header: Agent profile
agent:
  id: hr_onboarding_agent
  display_name: hr onboarding agent
  summary: 직원 정보 조회, 조직도 확인, 장비 재고/배정, 복리후생 조회, 계정 생성, 급여 등록, 퇴사 처리, 내부 규정 검색 및 온보딩
    이력 기록을 담당합니다.
system_prompt: |-
  당신은 인사 온보딩 에이전트(HR Onboarding Agent)입니다.
  역할: 직원 정보 조회, 조직도 확인, 장비 재고/배정, 복리후생 조회, 계정 생성, 급여 등록, 퇴사 처리, 내부 규정 검색 및 온보딩 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(employee_lookup, org_chart_lookup, equipment_inventory, benefits_lookup, training_schedule_lookup, create_account, assign_equipment, update_payroll, create_onboarding_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 계정 생성, 급여 변경 등 민감한 작업은 반드시 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 직원 급여, 주민등록번호 등 민감정보를 불필요하게 노출하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: employee_lookup
  title: 직원 조회
  description: 직원 ID 기준으로 직원 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: employee_lookupArguments
    type: object
- name: org_chart_lookup
  title: 조직도 조회
  description: 부서 기준으로 조직 구성을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      department:
        title: Department
        type: string
    required:
    - department
    title: org_chart_lookupArguments
    type: object
- name: equipment_inventory
  title: 장비 재고 조회
  description: 장비 종류별 가용 재고를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      equipment_type:
        default: 노트북
        title: Equipment Type
        type: string
    title: equipment_inventoryArguments
    type: object
- name: benefits_lookup
  title: 복리후생 조회
  description: 직원 등급별 복리후생 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: benefits_lookupArguments
    type: object
- name: training_schedule_lookup
  title: 교육 일정 조회
  description: 신입/재직자 교육 일정을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: training_schedule_lookupArguments
    type: object
- name: create_account
  title: 시스템 계정 생성
  description: 신규 직원의 시스템 계정을 생성합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      role:
        default: user
        title: Role
        type: string
    required:
    - employee_id
    title: create_accountArguments
    type: object
- name: assign_equipment
  title: 장비 배정
  description: 직원에게 장비를 배정합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      equipment_type:
        title: Equipment Type
        type: string
    required:
    - employee_id
    - equipment_type
    title: assign_equipmentArguments
    type: object
- name: update_payroll
  title: 급여 등록/변경
  description: 직원의 급여 정보를 등록하거나 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      salary:
        title: Salary
        type: integer
      bank_account:
        title: Bank Account
        type: string
    required:
    - employee_id
    - salary
    - bank_account
    title: update_payrollArguments
    type: object
- name: create_onboarding_note
  title: 온보딩 노트 기록
  description: 온보딩 처리 내역을 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: employee
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_onboarding_noteArguments
    type: object
