header: Agent profile
agent:
  id: insurance_claims_agent
  display_name: insurance claims agent
  summary: 보험 청구 조회, 보험 계약 확인, 청구인 프로필 조회, 손해 평가 조회, 보험금 지급 승인/거절, 추가 심사 요청, 내부 규정
    검색 및 심사 이력 기록을 담당합니다.
system_prompt: |-
  당신은 보험 청구 심사 에이전트(Insurance Claims Agent)입니다.
  역할: 보험 청구 조회, 보험 계약 확인, 청구인 프로필 조회, 손해 평가 조회, 보험금 지급 승인/거절, 추가 심사 요청, 내부 규정 검색 및 심사 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(claim_lookup, policy_lookup, claimant_profile_lookup, damage_assessment_lookup, claim_history_lookup, approve_claim_payout, reject_claim, request_additional_review, create_claim_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 보험금 지급 승인은 반드시 손해 평가 결과 및 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: claim_lookup
  title: 청구 조회
  description: 청구 ID 기준으로 청구 상세를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claim_id:
        title: Claim Id
        type: string
    required:
    - claim_id
    title: claim_lookupArguments
    type: object
- name: policy_lookup
  title: 보험 계약 조회
  description: 보험 계약 ID 기준으로 계약 내용을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      policy_id:
        title: Policy Id
        type: string
    required:
    - policy_id
    title: policy_lookupArguments
    type: object
- name: claimant_profile_lookup
  title: 청구인 프로필 조회
  description: 청구인 ID 기준으로 프로필을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claimant_id:
        title: Claimant Id
        type: string
    required:
    - claimant_id
    title: claimant_profile_lookupArguments
    type: object
- name: damage_assessment_lookup
  title: 손해 평가 조회
  description: 청구 ID 기준으로 손해 평가 결과를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claim_id:
        title: Claim Id
        type: string
    required:
    - claim_id
    title: damage_assessment_lookupArguments
    type: object
- name: claim_history_lookup
  title: 청구 이력 조회
  description: 청구인의 과거 청구 이력을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claimant_id:
        title: Claimant Id
        type: string
    required:
    - claimant_id
    title: claim_history_lookupArguments
    type: object
- name: approve_claim_payout
  title: 보험금 지급 승인
  description: 청구 건에 대해 보험금 지급을 승인합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claim_id:
        title: Claim Id
        type: string
      amount:
        title: Amount
        type: integer
      reason:
        title: Reason
        type: string
    required:
    - claim_id
    - amount
    - reason
    title: approve_claim_payoutArguments
    type: object
- name: reject_claim
  title: 청구 거절
  description: 청구 건을 거절합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claim_id:
        title: Claim Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - claim_id
    - reason
    title: reject_claimArguments
    type: object
- name: request_additional_review
  title: 추가 심사 요청
  description: 청구 건에 대해 추가 심사를 요청합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      claim_id:
        title: Claim Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - claim_id
    - reason
    title: request_additional_reviewArguments
    type: object
- name: create_claim_note
  title: 심사 노트 기록
  description: 심사 내역을 내부 노트로 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: claim
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_claim_noteArguments
    type: object
