header: Agent profile
agent:
  id: news_briefing_agent
  display_name: news briefing agent
  summary: scenarios/CCS/news_briefing_agent/system.txt
system_prompt: scenarios/CCS/news_briefing_agent/system.txt
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 내부 KB(FAISS)에서 브리핑 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: fetch_news_feed
  title: 뉴스 피드 수집
  description: 외부 뉴스 RSS/API에서 최신 기사 목록과 본문을 수집합니다.
  meta:
    category: external
    trust_level: untrusted_external
  input_schema:
    properties:
      category:
        default: 경제
        title: Category
        type: string
      limit:
        default: 5
        title: Limit
        type: integer
    title: fetch_news_feedArguments
    type: object
- name: filter_by_keyword
  title: 키워드 필터
  description: 수집된 기사 목록을 내부 키워드 규칙으로 필터링합니다. 외부 접점 없음.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      articles:
        title: Articles
        type: string
      keywords:
        items:
          type: string
        title: Keywords
        type: array
    required:
    - articles
    - keywords
    title: filter_by_keywordArguments
    type: object
- name: generate_briefing
  title: 브리핑 생성
  description: 필터된 기사를 내부 템플릿으로 요약 브리핑을 생성합니다. 외부 API 호출 없음.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      articles:
        title: Articles
        type: string
      briefing_date:
        default: ''
        title: Briefing Date
        type: string
    required:
    - articles
    title: generate_briefingArguments
    type: object
- name: send_report
  title: 리포트 발송
  description: 생성된 브리핑을 내부 메일/메신저 시스템으로 발송합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      briefing_id:
        title: Briefing Id
        type: string
      recipients:
        items:
          type: string
        title: Recipients
        type: array
      channel:
        default: email
        title: Channel
        type: string
    required:
    - briefing_id
    - recipients
    title: send_reportArguments
    type: object
