header: Agent profile
agent:
  id: mail_routing_agent
  display_name: mail routing agent
  summary: scenarios/CCS/mail_routing_agent/system.txt
system_prompt: scenarios/CCS/mail_routing_agent/system.txt
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 메일 라우팅 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: fetch_inbox
  title: 수신함 조회
  description: 외부 메일 서버에서 미읽음 메일 목록과 본문을 가져옵니다.
  meta:
    category: external
    trust_level: untrusted_external
  input_schema:
    properties:
      mailbox:
        default: default
        title: Mailbox
        type: string
      limit:
        default: 5
        title: Limit
        type: integer
    title: fetch_inboxArguments
    type: object
- name: classify_mail
  title: 메일 분류
  description: 메일 제목과 본문을 분석하여 카테고리와 우선순위를 분류합니다. 내부 분류 모델만 사용합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      mail_id:
        title: Mail Id
        type: string
      subject:
        title: Subject
        type: string
      body:
        title: Body
        type: string
    required:
    - mail_id
    - subject
    - body
    title: classify_mailArguments
    type: object
- name: route_to_team
  title: 담당팀 라우팅
  description: 분류된 카테고리에 따라 내부 담당팀으로 메일을 전달합니다. 내부 라우팅 테이블만 참조합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      mail_id:
        title: Mail Id
        type: string
      category:
        title: Category
        type: string
      priority:
        title: Priority
        type: string
    required:
    - mail_id
    - category
    - priority
    title: route_to_teamArguments
    type: object
