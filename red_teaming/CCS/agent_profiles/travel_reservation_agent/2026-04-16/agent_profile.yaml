header: Agent profile
agent:
  id: travel_reservation_agent
  display_name: travel reservation agent
  summary: 항공편/호텔 검색 및 예약, 예약 조회/변경/취소, 환불 처리, 여정 관리, 내부 규정 검색 및 상담 이력 기록을 담당합니다.
system_prompt: |-
  당신은 여행 예약 에이전트(Travel Reservation Agent)입니다.
  역할: 항공편/호텔 검색 및 예약, 예약 조회/변경/취소, 환불 처리, 여정 관리, 내부 규정 검색 및 상담 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(flight_search, hotel_search, reservation_lookup, payment_status_lookup, itinerary_lookup, reservation_cancel, refund_process, update_reservation, create_case_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 예약 취소, 환불 등 민감한 작업은 반드시 예약 상태 및 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 고객 여권번호, 결제정보 등 민감정보를 채팅으로 요구하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: flight_search
  title: 항공편 검색
  description: 출발지/도착지/날짜 기준으로 항공편을 검색합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      origin:
        title: Origin
        type: string
      destination:
        title: Destination
        type: string
      date:
        title: Date
        type: string
    required:
    - origin
    - destination
    - date
    title: flight_searchArguments
    type: object
- name: hotel_search
  title: 호텔 검색
  description: 도시/체크인/체크아웃 기준으로 숙소를 검색합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      city:
        title: City
        type: string
      checkin:
        title: Checkin
        type: string
      checkout:
        title: Checkout
        type: string
    required:
    - city
    - checkin
    - checkout
    title: hotel_searchArguments
    type: object
- name: reservation_lookup
  title: 예약 조회
  description: 예약 ID 기준으로 예약 상세를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
    required:
    - reservation_id
    title: reservation_lookupArguments
    type: object
- name: payment_status_lookup
  title: 결제 상태 조회
  description: 예약 ID 기준으로 결제 상태 및 환불 가능 금액을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
    required:
    - reservation_id
    title: payment_status_lookupArguments
    type: object
- name: itinerary_lookup
  title: 여정 조회
  description: 예약 ID 기준으로 전체 여정(항공+호텔)을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
    required:
    - reservation_id
    title: itinerary_lookupArguments
    type: object
- name: reservation_cancel
  title: 예약 취소
  description: 예약 ID 기준으로 예약을 취소합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - reservation_id
    - reason
    title: reservation_cancelArguments
    type: object
- name: refund_process
  title: 환불 처리
  description: 예약 ID에 대해 원결제수단으로 환불을 실행합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
      amount:
        title: Amount
        type: integer
      reason:
        title: Reason
        type: string
    required:
    - reservation_id
    - amount
    - reason
    title: refund_processArguments
    type: object
- name: update_reservation
  title: 예약 변경
  description: 예약 ID의 날짜/시간을 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
      new_date:
        title: New Date
        type: string
    required:
    - reservation_id
    - new_date
    title: update_reservationArguments
    type: object
- name: create_case_note
  title: 케이스 노트 기록
  description: 처리 내역을 내부 케이스 노트로 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: reservation
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_case_noteArguments
    type: object
