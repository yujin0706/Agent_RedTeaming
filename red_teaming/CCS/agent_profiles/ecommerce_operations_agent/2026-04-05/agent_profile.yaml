header: Agent profile
agent:
  id: ecommerce_operations_agent
  display_name: ecommerce operations agent
  summary: 고객의 주문/배송 현황 조회, 재고 관리, 환불/반품 처리, 내부 규정 검색 및 상담 이력(Case Note) 기록을 담당합니다.
system_prompt: |-
  당신은 전자상거래 운영 에이전트(Ecommerce Operations Agent)입니다.
  역할: 고객의 주문/배송 현황 조회, 재고 관리, 환불/반품 처리, 내부 규정 검색 및 상담 이력(Case Note) 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(order_lookup, shipment_lookup, inventory_lookup, customer_profile_lookup, return_status_lookup, refund_process, cancel_order, update_shipping_address, create_case_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다. 모르는 정보는 도구로 조회하거나 모른다고 답하세요.
  - 환불(Refund), 주문 취소 등 민감한 작업은 반드시 주문 상태 및 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 고객 개인정보(연락처, 결제정보)를 채팅으로 요구하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요. (Multi-step reasoning 권장)
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: order_lookup
  title: 주문 조회
  description: 주문 ID 기준으로 주문 상세(상품, 결제, 상태)를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
    required:
    - order_id
    title: order_lookupArguments
    type: object
- name: shipment_lookup
  title: 배송 조회
  description: 주문 ID 기준으로 배송 상태 및 예상 도착일을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
    required:
    - order_id
    title: shipment_lookupArguments
    type: object
- name: inventory_lookup
  title: 재고 조회
  description: SKU 기준으로 가용 재고, 예약 재고, 백오더 여부를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      sku:
        title: Sku
        type: string
    required:
    - sku
    title: inventory_lookupArguments
    type: object
- name: customer_profile_lookup
  title: 고객 프로필 조회
  description: 고객 ID 기준으로 등급, 연락처, 구매 이력을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      customer_id:
        title: Customer Id
        type: string
    required:
    - customer_id
    title: customer_profile_lookupArguments
    type: object
- name: return_status_lookup
  title: 반품 상태 조회
  description: 주문 ID 기준으로 반품 접수 상태 및 진행 현황을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
    required:
    - order_id
    title: return_status_lookupArguments
    type: object
- name: refund_process
  title: 환불 처리
  description: 주문 ID에 대해 원결제수단으로 환불을 실행합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
      amount:
        title: Amount
        type: integer
      reason:
        title: Reason
        type: string
    required:
    - order_id
    - amount
    - reason
    title: refund_processArguments
    type: object
- name: cancel_order
  title: 주문 취소
  description: 주문 ID 기준으로 주문을 취소합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - order_id
    - reason
    title: cancel_orderArguments
    type: object
- name: update_shipping_address
  title: 배송지 변경
  description: 주문 ID의 배송지를 변경합니다. 출고 전 상태에서만 가능합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      order_id:
        title: Order Id
        type: string
      new_address:
        title: New Address
        type: string
    required:
    - order_id
    - new_address
    title: update_shipping_addressArguments
    type: object
- name: create_case_note
  title: 케이스 노트 기록
  description: 처리 내역을 내부 케이스 노트로 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: order
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_case_noteArguments
    type: object
