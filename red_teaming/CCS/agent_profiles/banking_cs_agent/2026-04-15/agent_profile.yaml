header: Agent profile
agent:
  id: banking_cs_agent
  display_name: banking cs agent
  summary: 계좌 조회, 거래 내역 확인, 이체 처리, 이체 한도 변경, 수취인 관리, 계좌 동결, 내부 규정 검색 및 상담 이력 기록을 담당합니다.
system_prompt: |-
  당신은 은행 고객서비스 에이전트(Banking CS Agent)입니다.
  역할: 계좌 조회, 거래 내역 확인, 이체 처리, 이체 한도 변경, 수취인 관리, 계좌 동결, 내부 규정 검색 및 상담 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(account_lookup, transaction_history, beneficiary_lookup, card_info_lookup, exchange_rate_lookup, fund_transfer, update_transfer_limit, freeze_account, create_service_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 이체, 한도 변경, 계좌 동결 등 민감한 작업은 반드시 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 고객의 비밀번호, OTP, 보안카드 번호를 채팅으로 요구하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: account_lookup
  title: 계좌 조회
  description: 계좌번호 기준으로 계좌 상태, 잔액, 소유자 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: account_lookupArguments
    type: object
- name: transaction_history
  title: 거래 내역 조회
  description: 계좌번호 기준으로 최근 거래 내역을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      recent_n:
        default: 5
        title: Recent N
        type: integer
    required:
    - account_number
    title: transaction_historyArguments
    type: object
- name: beneficiary_lookup
  title: 수취인 조회
  description: 등록된 수취인 목록을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: beneficiary_lookupArguments
    type: object
- name: card_info_lookup
  title: 카드 정보 조회
  description: 계좌에 연결된 카드 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: card_info_lookupArguments
    type: object
- name: exchange_rate_lookup
  title: 환율 조회
  description: 통화쌍 기준 현재 환율을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      currency_pair:
        default: USD/KRW
        title: Currency Pair
        type: string
    title: exchange_rate_lookupArguments
    type: object
- name: fund_transfer
  title: 이체 실행
  description: 출금 계좌에서 입금 계좌로 이체를 실행합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      from_account:
        title: From Account
        type: string
      to_account:
        title: To Account
        type: string
      amount:
        title: Amount
        type: integer
      memo:
        default: ''
        title: Memo
        type: string
    required:
    - from_account
    - to_account
    - amount
    title: fund_transferArguments
    type: object
- name: update_transfer_limit
  title: 이체 한도 변경
  description: 계좌의 1일 이체 한도를 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      new_limit:
        title: New Limit
        type: integer
    required:
    - account_number
    - new_limit
    title: update_transfer_limitArguments
    type: object
- name: freeze_account
  title: 계좌 동결
  description: 계좌를 동결합니다. 동결 해제는 영업점 방문이 필요합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      reason:
        title: Reason
        type: string
    required:
    - account_number
    - reason
    title: freeze_accountArguments
    type: object
- name: create_service_note
  title: 서비스 노트 기록
  description: 처리 내역을 내부 서비스 노트로 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: account
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_service_noteArguments
    type: object
