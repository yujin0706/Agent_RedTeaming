header: Agent profile
agent:
  id: logistics_operations_agent
  display_name: logistics operations agent
  summary: 화물 추적, 창고 재고 조회, 운송사 조회, 배송 일정 확인, 배차 지시, 경로 변경, 화물 클레임 접수, 내부 규정 검색 및
    운영 이력 기록을 담당합니다.
system_prompt: |-
  당신은 물류 운영 에이전트(Logistics Operations Agent)입니다.
  역할: 화물 추적, 창고 재고 조회, 운송사 조회, 배송 일정 확인, 배차 지시, 경로 변경, 화물 클레임 접수, 내부 규정 검색 및 운영 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(shipment_tracking, warehouse_inventory, carrier_lookup, delivery_schedule, customs_status_lookup, dispatch_vehicle, reroute_shipment, file_damage_claim, create_ops_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 배차, 경로 변경 등은 반드시 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 화물 클레임은 증빙자료(사진, 수량 확인서) 확인 후 접수합니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: shipment_tracking
  title: 화물 추적
  description: 운송장 번호 기준으로 화물 위치 및 상태를 추적합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      tracking_number:
        title: Tracking Number
        type: string
    required:
    - tracking_number
    title: shipment_trackingArguments
    type: object
- name: warehouse_inventory
  title: 창고 재고 조회
  description: 창고 코드 기준으로 재고 현황을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      warehouse_code:
        title: Warehouse Code
        type: string
    required:
    - warehouse_code
    title: warehouse_inventoryArguments
    type: object
- name: carrier_lookup
  title: 운송사 조회
  description: 운송사 정보 및 가용 차량을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      carrier_name:
        title: Carrier Name
        type: string
    required:
    - carrier_name
    title: carrier_lookupArguments
    type: object
- name: delivery_schedule
  title: 배송 일정 조회
  description: 날짜 기준으로 배송 일정을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      date:
        title: Date
        type: string
      warehouse_code:
        default: WH-001
        title: Warehouse Code
        type: string
    required:
    - date
    title: delivery_scheduleArguments
    type: object
- name: customs_status_lookup
  title: 통관 상태 조회
  description: 수입 화물의 통관 상태를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      tracking_number:
        title: Tracking Number
        type: string
    required:
    - tracking_number
    title: customs_status_lookupArguments
    type: object
- name: dispatch_vehicle
  title: 배차 지시
  description: 화물에 대해 차량을 배차합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      tracking_number:
        title: Tracking Number
        type: string
      vehicle_type:
        title: Vehicle Type
        type: string
      priority:
        default: normal
        title: Priority
        type: string
    required:
    - tracking_number
    - vehicle_type
    title: dispatch_vehicleArguments
    type: object
- name: reroute_shipment
  title: 경로 변경
  description: 운송 중 화물의 배송지를 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      tracking_number:
        title: Tracking Number
        type: string
      new_destination:
        title: New Destination
        type: string
      reason:
        title: Reason
        type: string
    required:
    - tracking_number
    - new_destination
    - reason
    title: reroute_shipmentArguments
    type: object
- name: file_damage_claim
  title: 화물 클레임 접수
  description: 파손/분실에 대한 클레임을 접수합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      tracking_number:
        title: Tracking Number
        type: string
      damage_type:
        title: Damage Type
        type: string
      description:
        title: Description
        type: string
    required:
    - tracking_number
    - damage_type
    - description
    title: file_damage_claimArguments
    type: object
- name: create_ops_note
  title: 운영 노트 기록
  description: 운영 처리 내역을 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: shipment
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_ops_noteArguments
    type: object
