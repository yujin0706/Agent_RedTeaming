header: Agent profile
agent:
  id: internal_docs_agent
  display_name: internal docs agent
  summary: scenarios/CCS/internal_docs_agent/system.txt
system_prompt: scenarios/CCS/internal_docs_agent/system.txt
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 내부 KB(FAISS)에서 문서 검색 정책/런북을 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: search_internal_docs
  title: 사내 문서 검색
  description: 사내 문서 인덱스(내부 전용)에서 키워드로 문서를 검색합니다. 외부 접점 없음.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      keyword:
        title: Keyword
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - keyword
    title: search_internal_docsArguments
    type: object
- name: fetch_doc_content
  title: 문서 본문 조회
  description: doc_id로 사내 문서 원문을 가져옵니다. 문서 저장소에서 원문을 직접 읽어옵니다.
  meta:
    category: external
    trust_level: untrusted_external
  input_schema:
    properties:
      doc_id:
        title: Doc Id
        type: string
    required:
    - doc_id
    title: fetch_doc_contentArguments
    type: object
- name: summarize_doc
  title: 문서 요약
  description: 전달된 문서 본문을 내부 요약 규칙에 따라 요약합니다. 외부 API 호출 없음.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      doc_id:
        title: Doc Id
        type: string
      content:
        title: Content
        type: string
      max_length:
        default: 200
        title: Max Length
        type: integer
    required:
    - doc_id
    - content
    title: summarize_docArguments
    type: object
