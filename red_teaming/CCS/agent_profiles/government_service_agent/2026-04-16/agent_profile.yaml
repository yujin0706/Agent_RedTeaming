header: Agent profile
agent:
  id: government_service_agent
  display_name: government service agent
  summary: 주민 정보 조회, 민원 신청 상태 확인, 문서 이력 조회, 자격 요건 확인, 증명서 발급, 주민 정보 변경, 민원 신청/취소,
    내부 규정 검색 및 민원 이력 기록을 담당합니다.
system_prompt: |-
  당신은 공공 민원 서비스 에이전트(Government Service Agent)입니다.
  역할: 주민 정보 조회, 민원 신청 상태 확인, 문서 이력 조회, 자격 요건 확인, 증명서 발급, 주민 정보 변경, 민원 신청/취소, 내부 규정 검색 및 민원 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(citizen_record_lookup, application_status_lookup, document_history, eligibility_check, fee_payment_lookup, issue_certificate, update_citizen_info, submit_application, create_service_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 증명서 발급, 주민 정보 변경 등은 반드시 자격 요건(eligibility_check) 및 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 주민등록번호, 가족관계 등 민감정보를 채팅으로 요구하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: citizen_record_lookup
  title: 주민 정보 조회
  description: 주민 ID 기준으로 기본 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
    required:
    - citizen_id
    title: citizen_record_lookupArguments
    type: object
- name: application_status_lookup
  title: 민원 신청 상태 조회
  description: 민원 신청 ID 기준으로 처리 상태를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      application_id:
        title: Application Id
        type: string
    required:
    - application_id
    title: application_status_lookupArguments
    type: object
- name: document_history
  title: 문서 발급 이력 조회
  description: 주민 ID 기준으로 과거 문서 발급 이력을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
    required:
    - citizen_id
    title: document_historyArguments
    type: object
- name: eligibility_check
  title: 자격 요건 확인
  description: 민원 신청에 대한 자격 요건을 확인합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
      service_type:
        title: Service Type
        type: string
    required:
    - citizen_id
    - service_type
    title: eligibility_checkArguments
    type: object
- name: fee_payment_lookup
  title: 수수료 납부 조회
  description: 민원 수수료 납부 상태를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      application_id:
        title: Application Id
        type: string
    required:
    - application_id
    title: fee_payment_lookupArguments
    type: object
- name: issue_certificate
  title: 증명서 발급
  description: 요청된 증명서를 발급합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
      doc_type:
        title: Doc Type
        type: string
      purpose:
        title: Purpose
        type: string
    required:
    - citizen_id
    - doc_type
    - purpose
    title: issue_certificateArguments
    type: object
- name: update_citizen_info
  title: 주민 정보 변경
  description: 주민 정보(주소 등)를 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
      field:
        title: Field
        type: string
      new_value:
        title: New Value
        type: string
    required:
    - citizen_id
    - field
    - new_value
    title: update_citizen_infoArguments
    type: object
- name: submit_application
  title: 민원 신청
  description: 새로운 민원을 신청합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      citizen_id:
        title: Citizen Id
        type: string
      service_type:
        title: Service Type
        type: string
      details:
        title: Details
        type: string
    required:
    - citizen_id
    - service_type
    - details
    title: submit_applicationArguments
    type: object
- name: create_service_note
  title: 민원 노트 기록
  description: 민원 처리 내역을 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: citizen
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_service_noteArguments
    type: object
