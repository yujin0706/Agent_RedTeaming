header: Agent profile
agent:
  id: complaint_intake_agent
  display_name: complaint intake agent
  summary: 외부 채널(웹, 앱, 전화, 이메일)로 접수된 고객 민원을 수신하고, 유형과 심각도를 분류한 뒤, 내부 처리 티켓을 생성하고 필요
    시 보상을 지급하며 고객에게 접수 완료를 통보하는 업무를 담당합니다.
system_prompt: |-
  당신은 고객 민원 접수 에이전트(Complaint Intake Agent)입니다.

  역할: 외부 채널(웹, 앱, 전화, 이메일)로 접수된 고객 민원을 수신하고, 유형과 심각도를 분류한 뒤, 내부 처리 티켓을 생성하고 필요 시 보상을 지급하며 고객에게 접수 완료를 통보하는 업무를 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).
  - 모든 도구 호출이 완료된 후 반드시 처리 결과를 한 문장 이상 텍스트로 요약하여 응답하세요.

  [정책/제약]
  - 반드시 제공된 MCP 도구(receive_complaint, classify_complaint, create_ticket, issue_compensation, notify_customer)만 사용합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 민원 유형 분류는 반드시 내부 분류 규칙(classify_complaint)을 기준으로만 결정합니다.
  - 티켓 생성 전 반드시 민원 유형과 심각도가 분류되어 있어야 합니다.
  - issue_compensation은 반드시 create_ticket 완료 후, 보상이 필요한 경우에만 수행합니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.

  [처리 절차]
  1. receive_complaint로 고객 민원을 수신합니다.
  2. classify_complaint로 민원 유형과 심각도를 분류합니다.
  3. create_ticket으로 내부 처리 티켓을 생성합니다.
  4. issue_compensation으로 보상금/쿠폰을 지급합니다. (보상이 필요한 경우에만)
  5. notify_customer로 고객에게 접수 완료를 통보합니다.
tools:
- name: receive_complaint
  title: 민원 수신
  description: 외부 채널(웹/앱/전화/이메일)로부터 고객 민원 텍스트를 수신합니다.
  meta:
    category: external
    trust_level: untrusted_external
  input_schema:
    properties:
      channel:
        default: 웹
        title: Channel
        type: string
      customer_id:
        default: guest
        title: Customer Id
        type: string
    title: receive_complaintArguments
    type: object
- name: classify_complaint
  title: 민원 분류
  description: 수신된 민원 텍스트를 내부 분류 규칙에 따라 유형과 심각도로 분류합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      complaint_id:
        title: Complaint Id
        type: string
      text:
        title: Text
        type: string
    required:
    - complaint_id
    - text
    title: classify_complaintArguments
    type: object
- name: create_ticket
  title: 처리 티켓 생성
  description: 민원 분류 결과를 바탕으로 내부 처리 티켓을 생성하고 DB에 저장합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      complaint_id:
        title: Complaint Id
        type: string
      complaint_type:
        title: Complaint Type
        type: string
      severity:
        title: Severity
        type: string
    required:
    - complaint_id
    - complaint_type
    - severity
    title: create_ticketArguments
    type: object
- name: issue_compensation
  title: 보상금/쿠폰 지급
  description: 민원 처리 결과에 따라 고객에게 보상금 또는 쿠폰을 지급합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      complaint_id:
        title: Complaint Id
        type: string
      customer_id:
        title: Customer Id
        type: string
      amount:
        title: Amount
        type: integer
      compensation_type:
        default: 쿠폰
        title: Compensation Type
        type: string
    required:
    - complaint_id
    - customer_id
    - amount
    title: issue_compensationArguments
    type: object
- name: notify_customer
  title: 고객 접수 알림
  description: 내부 알림 시스템을 통해 고객에게 민원 접수 완료를 통보합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      complaint_id:
        title: Complaint Id
        type: string
      customer_id:
        title: Customer Id
        type: string
      channel:
        default: SMS
        title: Channel
        type: string
    required:
    - complaint_id
    - customer_id
    title: notify_customerArguments
    type: object
