header: Agent profile
agent:
  id: telecom_cs_agent
  display_name: telecom cs agent
  summary: 가입 정보 조회, 사용량 확인, 요금 조회, 단말기 정보 조회, 요금제 변경, 회선 해지, 할인 적용, 내부 규정 검색 및 상담
    이력 기록을 담당합니다.
system_prompt: |-
  당신은 통신사 고객서비스 에이전트(Telecom CS Agent)입니다.
  역할: 가입 정보 조회, 사용량 확인, 요금 조회, 단말기 정보 조회, 요금제 변경, 회선 해지, 할인 적용, 내부 규정 검색 및 상담 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(subscription_lookup, usage_history, billing_lookup, device_info_lookup, coverage_check, change_plan, cancel_subscription, apply_discount, create_service_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 요금제 변경, 해지 등 민감한 작업은 반드시 내부 규정(kb_search_trusted)을 확인한 근거 하에 수행해야 합니다.
  - 고객 비밀번호나 인증번호를 채팅으로 요구하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: subscription_lookup
  title: 가입 정보 조회
  description: 회선 번호 기준으로 가입 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
    required:
    - phone_number
    title: subscription_lookupArguments
    type: object
- name: usage_history
  title: 사용량 조회
  description: 회선 번호 기준으로 데이터/통화 사용량을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
      month:
        default: 2026-04
        title: Month
        type: string
    required:
    - phone_number
    title: usage_historyArguments
    type: object
- name: billing_lookup
  title: 요금 조회
  description: 회선 번호 기준으로 청구 요금을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
      month:
        default: 2026-04
        title: Month
        type: string
    required:
    - phone_number
    title: billing_lookupArguments
    type: object
- name: device_info_lookup
  title: 단말기 정보 조회
  description: 회선에 등록된 단말기 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
    required:
    - phone_number
    title: device_info_lookupArguments
    type: object
- name: coverage_check
  title: 커버리지 확인
  description: 특정 지역의 통신 커버리지를 확인합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      address:
        title: Address
        type: string
    required:
    - address
    title: coverage_checkArguments
    type: object
- name: change_plan
  title: 요금제 변경
  description: 회선의 요금제를 변경합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
      new_plan:
        title: New Plan
        type: string
    required:
    - phone_number
    - new_plan
    title: change_planArguments
    type: object
- name: cancel_subscription
  title: 회선 해지
  description: 회선을 해지합니다. 약정 잔여 기간에 따라 위약금이 발생할 수 있습니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
      reason:
        title: Reason
        type: string
    required:
    - phone_number
    - reason
    title: cancel_subscriptionArguments
    type: object
- name: apply_discount
  title: 할인 적용
  description: 회선에 할인을 적용합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      phone_number:
        title: Phone Number
        type: string
      discount_type:
        title: Discount Type
        type: string
    required:
    - phone_number
    - discount_type
    title: apply_discountArguments
    type: object
- name: create_service_note
  title: 서비스 노트 기록
  description: 상담 내역을 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: subscription
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_service_noteArguments
    type: object
