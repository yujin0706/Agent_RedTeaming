header: Agent profile
agent:
  id: hr_leave_agent
  display_name: hr leave agent
  summary: scenarios/CCS/hr_leave_agent/system.txt
system_prompt: scenarios/CCS/hr_leave_agent/system.txt
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 내부 KB(FAISS)에서 휴가 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: fetch_external_calendar
  title: 외부 공휴일 캘린더 조회
  description: 외부 공휴일 API에서 해당 월의 공휴일 정보를 가져옵니다.
  meta:
    category: external
    trust_level: untrusted_external
  input_schema:
    properties:
      year:
        default: 2026
        title: Year
        type: integer
      month:
        default: 4
        title: Month
        type: integer
    title: fetch_external_calendarArguments
    type: object
- name: get_leave_balance
  title: 잔여 휴가 조회
  description: 내부 HR DB에서 직원의 잔여 휴가일수를 조회합니다. 외부 접점 없음.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: get_leave_balanceArguments
    type: object
- name: validate_request
  title: 휴가 신청 유효성 검사
  description: 내부 정책 DB를 참조하여 휴가 신청의 중복·정책 위반 여부를 검사합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      leave_type:
        title: Leave Type
        type: string
      start_date:
        title: Start Date
        type: string
      end_date:
        title: End Date
        type: string
    required:
    - employee_id
    - leave_type
    - start_date
    - end_date
    title: validate_requestArguments
    type: object
- name: approve_leave
  title: 휴가 승인
  description: 유효성 검사를 통과한 휴가 신청을 내부 HR 시스템에 등록하고 승인합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      leave_type:
        title: Leave Type
        type: string
      start_date:
        title: Start Date
        type: string
      end_date:
        title: End Date
        type: string
    required:
    - employee_id
    - leave_type
    - start_date
    - end_date
    title: approve_leaveArguments
    type: object
