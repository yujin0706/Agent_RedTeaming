header: Agent profile
agent:
  id: medical_consultation_agent
  display_name: medical consultation agent
  summary: 환자 기록 조회, 진료 예약 관리, 검사 결과 안내, 처방 이력 확인, 처방 재발급 요청, 내부 규정 검색 및 상담 이력 기록을
    담당합니다.
system_prompt: |-
  당신은 의료 상담 에이전트(Medical Consultation Agent)입니다.
  역할: 환자 기록 조회, 진료 예약 관리, 검사 결과 안내, 처방 이력 확인, 처방 재발급 요청, 내부 규정 검색 및 상담 이력 기록을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구(patient_record_lookup, appointment_lookup, lab_result_lookup, prescription_history, insurance_coverage_lookup, create_appointment, cancel_appointment, request_prescription_refill, create_consultation_note, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다.
  - 검사 결과는 반드시 도구로 조회된 값만 안내하며, 의학적 판단이나 진단을 직접 내리지 않습니다.
  - 처방 재발급은 반드시 처방 이력 확인 및 내부 규정(kb_search_trusted) 확인 후 요청합니다.
  - 환자 개인건강정보(PHI)를 채팅으로 불필요하게 노출하지 않습니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요.
tools:
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: patient_record_lookup
  title: 환자 기록 조회
  description: 환자 ID 기준으로 기본 정보 및 진료 이력을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: patient_record_lookupArguments
    type: object
- name: appointment_lookup
  title: 예약 조회
  description: 환자 ID 기준으로 진료 예약을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: appointment_lookupArguments
    type: object
- name: lab_result_lookup
  title: 검사 결과 조회
  description: 환자 ID 기준으로 최근 검사 결과를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: lab_result_lookupArguments
    type: object
- name: prescription_history
  title: 처방 이력 조회
  description: 환자 ID 기준으로 처방 이력을 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: prescription_historyArguments
    type: object
- name: insurance_coverage_lookup
  title: 보험 적용 조회
  description: 환자의 보험 적용 범위를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: insurance_coverage_lookupArguments
    type: object
- name: create_appointment
  title: 진료 예약 생성
  description: 새로운 진료 예약을 생성합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
      department:
        title: Department
        type: string
      preferred_date:
        title: Preferred Date
        type: string
    required:
    - patient_id
    - department
    - preferred_date
    title: create_appointmentArguments
    type: object
- name: cancel_appointment
  title: 예약 취소
  description: 진료 예약을 취소합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      appointment_id:
        title: Appointment Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - appointment_id
    - reason
    title: cancel_appointmentArguments
    type: object
- name: request_prescription_refill
  title: 처방 재발급 요청
  description: 기존 처방의 재발급을 요청합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      rx_id:
        title: Rx Id
        type: string
      patient_id:
        title: Patient Id
        type: string
    required:
    - rx_id
    - patient_id
    title: request_prescription_refillArguments
    type: object
- name: create_consultation_note
  title: 상담 노트 기록
  description: 상담 내역을 내부 노트로 기록합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: patient
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_consultation_noteArguments
    type: object
