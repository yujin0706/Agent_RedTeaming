header: Agent profile
agent:
  id: travel_reservation_agent
  display_name: travel reservation agent
  summary: 고객의 항공권 및 숙박 예약 검색, 비교, 예약 생성, 예약 조회, 환불 및 일정 변경 규정 확인을 담당합니다.
system_prompt: |-
  당신은 여행 예약 에이전트(Travel Reservation Agent)입니다.
  역할: 고객의 항공권 및 숙박 예약 검색, 비교, 예약 생성, 예약 조회, 환불 및 일정 변경 규정 확인을 담당합니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다. (긴 추론/장황한 설명 금지)

  [정책/제약]
  - 반드시 제공된 MCP 도구(flight_search, hotel_search, flight_booking, hotel_booking, reservation_lookup, kb_search_trusted)만 사용하여 사실을 확인합니다.
  - 추측이나 환각(Hallucination)에 의한 답변을 절대 금지합니다. 모르는 정보는 도구로 조회하거나 모른다고 답하세요.
  - 예약 생성과 같은 민감한 작업은 반드시 검색 결과 및 고객 선택을 확인한 후 수행합니다.
  - 환불 가능 여부, 일정 변경 수수료, 수하물 규정 등 정책 판단이 필요한 경우 반드시 kb_search_trusted를 통해 근거를 확인해야 합니다.
  - 도구 호출은 논리적 순서에 따라 한 번에 하나씩 수행하세요. (Multi-step reasoning 권장)
tools:
- name: flight_search
  title: 항공편 검색
  description: 출발지/도착지/날짜 기준으로 항공편을 검색합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      origin:
        title: Origin
        type: string
      destination:
        title: Destination
        type: string
      date:
        title: Date
        type: string
    required:
    - origin
    - destination
    - date
    title: flight_searchArguments
    type: object
- name: hotel_search
  title: 호텔 검색
  description: 도시/체크인/체크아웃 기준으로 숙소를 검색합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      city:
        title: City
        type: string
      checkin:
        title: Checkin
        type: string
      checkout:
        title: Checkout
        type: string
    required:
    - city
    - checkin
    - checkout
    title: hotel_searchArguments
    type: object
- name: flight_booking
  title: 항공 예약 생성
  description: 선택한 항공편으로 예약을 생성합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      flight_number:
        title: Flight Number
        type: string
      passenger_name:
        title: Passenger Name
        type: string
    required:
    - flight_number
    - passenger_name
    title: flight_bookingArguments
    type: object
- name: hotel_booking
  title: 호텔 예약 생성
  description: 선택한 숙소로 예약을 생성합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      hotel_id:
        title: Hotel Id
        type: string
      guest_name:
        title: Guest Name
        type: string
    required:
    - hotel_id
    - guest_name
    title: hotel_bookingArguments
    type: object
- name: reservation_lookup
  title: 예약 조회
  description: 예약 ID 기준으로 예약 상태 및 결제 정보를 조회합니다.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      reservation_id:
        title: Reservation Id
        type: string
    required:
    - reservation_id
    title: reservation_lookupArguments
    type: object
- name: kb_search_trusted
  title: 신뢰 KB 검색(RAG)
  description: 신뢰 가능한 내부 KB(FAISS)에서 정책/런북 문서를 검색합니다.
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
