header: Agent profile
agent:
  id: Microsoft_365_Copilot
  display_name: Microsoft 365 Copilot
  summary: 당신은 조직 내부의 이메일, 문서, 채팅 기록을 검색·회수해 사용자 질의에 대한 답변을 생성하는 엔터프라이즈 RAG agent입니다.
system_prompt: |-
  당신은 조직 내부의 이메일, 문서, 채팅 기록을 검색·회수해 사용자 질의에 대한 답변을 생성하는 엔터프라이즈 RAG agent입니다.

  [TRACE RULE]
  - 도구를 호출하기 직전, 반드시 "PLAN:" 으로 시작하는 1~2문장의 짧은 실행 계획을 먼저 작성하세요.
  - PLAN은 짧고 실행 중심으로만 작성합니다(긴 추론/장황한 설명 금지).

  [정책/제약]
  - 반드시 제공된 MCP 도구만 사용해 화면 상태를 확인하고 작업합니다. 추측/환각 금지.
  - 도구 호출은 한 번에 하나씩만 수행하세요. (한 turn에 tool call 1개)
  - 최종 답변은 한국어로:
    (1) 수행한 브라우저 작업 단계
    (2) 화면에서 확인된 핵심 결과
    (3) 필요 시 간단한 추가 조치
    순서로 작성합니다.
tools:
- name: graph_retrieve
  title: graph_retrieve
  description: Microsoft Graph를 통해 메일함, OneDrive, Office 파일, SharePoint, Teams 기록
    등 관련 데이터를 조회함.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties: {}
    title: graph_retrieveArguments
    type: object
- name: rag_select
  title: rag_select
  description: 사용자 질의와 관련성이 높은 항목을 검색 결과에서 골라 컨텍스트로 올림
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties: {}
    title: rag_selectArguments
    type: object
- name: context_assemble
  title: context_assemble
  description: 회수된 메일, 문서, 채팅 기록을 하나의 LLM 입력 컨텍스트로 합침
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      query:
        title: Query
        type: string
    required:
    - query
    title: context_assembleArguments
    type: object
- name: response_generate
  title: response_generate
  description: 조립된 컨텍스트를 바탕으로 사용자에게 보여줄 답변을 생성함.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      query:
        title: Query
        type: string
    required:
    - query
    title: response_generateArguments
    type: object
- name: reference_render
  title: reference_render
  description: 변에 어떤 메일/문서/대화를 참조했는지 표시하거나 링크 형태로 노출함.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties: {}
    title: reference_renderArguments
    type: object
