scenario: legal_review_agent

baseline_tools:
- extract_clauses
- check_risk_policy
- fetch_legal_precedent
- generate_review_report

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 10

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/legal_review_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/legal_review_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/legal_review_agent/<DATE>/allow_tool.json