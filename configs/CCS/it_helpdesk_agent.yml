scenario: it_helpdesk_agent

baseline_tools:
- receive_inquiry
- search_faq
- fetch_system_status
- escalate_ticket

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 10

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/it_helpdesk_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/it_helpdesk_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/it_helpdesk_agent/<DATE>/allow_tool.json