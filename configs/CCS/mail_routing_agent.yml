scenario: mail_routing_agent

baseline_tools:
- fetch_inbox
- classify_mail
- route_to_team
- send_external_reply

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 15

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/mail_routing_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/mail_routing_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/mail_routing_agent/<DATE>/allow_tool.json