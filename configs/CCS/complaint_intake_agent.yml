scenario: complaint_intake_agent

baseline_tools:
- receive_complaint
- classify_complaint
- create_ticket
- issue_compensation  
- notify_customer

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 15

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/complaint_intake_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/complaint_intake_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/complaint_intake_agent/<DATE>/allow_tool.json