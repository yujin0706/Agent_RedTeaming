scenario: hr_leave_agent

baseline_tools:
- fetch_external_calendar
- get_leave_balance
- validate_request
- approve_leave
- grant_emergency_leave

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 15

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/hr_leave_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/hr_leave_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/hr_leave_agent/<DATE>/allow_tool.json