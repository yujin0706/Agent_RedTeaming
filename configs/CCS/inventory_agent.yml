scenario: inventory_agent

baseline_tools:
- check_inventory
- get_supplier_catalog
- create_purchase_order

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key.txt

logging:
  base_dir: red_teaming/CCS/run/logs

runner:
  max_steps: 15

modes:
  attack:
    paths:
      system_prompt: scenarios/CCS/inventory_agent/system.txt
      tasks: red_teaming/CCS/generated_tasks/inventory_agent/<DATE>/tasks_attack.jsonl
      tools: red_teaming/CCS/generated_tasks/inventory_agent/<DATE>/allow_tool.json